<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account - MoodFlix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/account.css">
</head>
<body>
  <main class="account-page">
    <div class="account-shell">
<section class="auth-gate glass-card" id="auth-container">
  <div class="auth-switcher">
    <div class="auth-tabs">
      <button type="button" class="active" id="login-tab">Login</button>
      <button type="button" id="signup-tab">Signup</button>
    </div>
    <div class="auth-form">
      <div class="field-group signup-only">
        <label for="signup-name">Name</label>
        <input type="text" id="signup-name" placeholder="Your name" autocomplete="name">
      </div>
      <div class="field-group signup-only">
        <label for="signup-username">Username</label>
        <input type="text" id="signup-username" placeholder="Choose a username" autocomplete="nickname">
      </div>
      <div class="field-group signup-only">
        <label for="signup-userid">Email ID</label>
        <input type="email" id="signup-userid" placeholder="Enter your email ID" autocomplete="email">
      </div>
      <div class="field-group signup-only">
        <label for="signup-password">Create Password</label>
        <div class="password-field">
          <input type="password" id="signup-password" placeholder="Create password" autocomplete="new-password">
          <button type="button" class="pw-toggle" data-target="signup-password">Show</button>
        </div>
      </div>
      <div class="field-group signup-only">
        <label for="confirm-password">Confirm Password</label>
        <div class="password-field">
          <input type="password" id="confirm-password" placeholder="Confirm password" autocomplete="new-password">
          <button type="button" class="pw-toggle" data-target="confirm-password">Show</button>
        </div>
      </div>
      <div class="field-group login-only">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email" autocomplete="email">
      </div>
      <div class="field-group login-only">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
      </div>
      <div class="auth-actions">
        <button type="button" id="auth-submit" class="btn-primary">Login</button>
        <button type="button" id="google-btn" class="btn-secondary">Sign in with Google</button>
      </div>
    </div>
  </div>
</section>

      <section class="profile-card" id="profile-container" style="display:none;">
        <h2>Your Account</h2>
        <p id="profile-name" class="muted"></p>
        <p id="profile-email" class="muted"></p>
        <p id="profile-username" class="muted"></p>
        <p id="profile-status" class="muted">Signed in account dashboard.</p>
        <div class="btn-row" style="margin-top:1rem;">
          <button type="button" class="btn-secondary" id="logout-btn">Logout</button>
        </div>
      </section>
      <section class="favorites-section" id="favorites-movies-section">
        <h2>Favourite Movies</h2>
        <div id="movies-watchlist-grid" class="watchlist-grid"></div>
      </section>
      <section class="favorites-section" id="favorites-series-section">
        <h2>Favourite Web Series</h2>
        <div id="series-watchlist-grid" class="watchlist-grid"></div>
      </section>
    </div>
  </main>

  <script type="module">
    import { handleAuth, handleGoogleLogin, handleLogout } from './js/auth.js';
    import { injectNavbar, injectFooter, enablePasswordToggles } from './js/main.js';

    let loginMode = true;
    const authSubmit = document.getElementById("auth-submit");
    const loginTab = document.getElementById("login-tab");
    const signupTab = document.getElementById("signup-tab");

    window.handleAuth = handleAuth;
    document.getElementById("google-btn").onclick = handleGoogleLogin;
    document.getElementById("logout-btn").onclick = handleLogout;

    function setMode(isLogin) {
      loginMode = isLogin;
      authSubmit.textContent = isLogin ? "Login" : "Create Account";
      loginTab.classList.toggle("active", isLogin);
      signupTab.classList.toggle("active", !isLogin);
    }

    authSubmit.onclick = () => handleAuth(loginMode);
    loginTab.onclick = () => setMode(true);
    signupTab.onclick = () => setMode(false);

    document.addEventListener("DOMContentLoaded", () => {
      injectNavbar();
      injectFooter();
      enablePasswordToggles();
    });
  </script>
</body>
</html>
